name: Publish to Gitea npm registry

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          # registry-url is what `npm publish` consults; the auth-token in
          # NODE_AUTH_TOKEN is interpolated into the generated .npmrc.
          registry-url: https://code.tarassov.ch/api/packages/ux/npm/
          scope: "@tarassov-ch"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGE_TOKEN }}
        run: npm publish
