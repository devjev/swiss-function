name: Publish to Gitea npm registry

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the "integrated on main" guard below can run merge-base.
          fetch-depth: 0

      # Only publish release tags that are actually merged into main. A tag placed
      # on a feature branch would otherwise publish a partial build (this is how
      # 0.34.0 / 0.35.0 went out incomplete). Tag releases AFTER merging to main.
      - name: Guard — tag must be integrated on main
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" FETCH_HEAD; then
            echo "::error::$GITHUB_SHA is not reachable from origin/main — refusing to publish a non-integrated build. Tag releases only after merging to main."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          # registry-url is what `npm publish` consults; the auth-token in
          # NODE_AUTH_TOKEN is interpolated into the generated .npmrc.
          registry-url: https://code.tarassov.ch/api/packages/ux/npm/
          scope: "@tarassov-ch"

      - name: Install
        run: npm ci

      # Biome ships as a prebuilt linux binary that won't run on the maintainer's
      # NixOS dev box, so it's intentionally NOT in package.json's devDependencies
      # (the flake.nix provides it locally). CI installs it globally here so the
      # `prepublishOnly` hook below can invoke `biome check .`.
      - name: Install biome
        run: npm install -g @biomejs/biome@2.4.15

      - name: Build
        run: npm run build

      # Idempotent: skip (don't fail) if this version is already in the registry,
      # so re-pushed tags or re-run jobs don't 409.
      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGE_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@tarassov-ch/swiss-function@$VERSION" version >/dev/null 2>&1; then
            echo "Version $VERSION is already published — skipping."
            exit 0
          fi
          npm publish

      # The registry gets the package; the repo Releases page gets the release
      # entry with the packed tarball attached (the manual `just release-package`
      # flow, automated). Idempotent: an existing release is reused (create races
      # to 409 → re-fetch), an already-attached asset is skipped.
      #
      # Every API call captures the HTTP status and body separately and parses
      # JSON only on a success status. Do NOT pipe `curl -f` straight into
      # `JSON.parse` — on any non-2xx, curl emits an empty body, the pipe runs
      # node anyway, and `JSON.parse("")` dies with "Unexpected end of JSON
      # input" (and under `-o pipefail`, `-f` aborts even a benign 409).
      - name: Forgejo release + tarball asset
        env:
          TOKEN: ${{ secrets.PACKAGE_TOKEN }}
        run: |
          set -euo pipefail
          API="https://code.tarassov.ch/api/v1/repos/${GITHUB_REPOSITORY}"
          TAG="${GITHUB_REF_NAME}"
          AUTH="Authorization: token $TOKEN"
          BODY="$(mktemp)"

          # req METHOD URL [curl-args...] — writes body to $BODY, echoes HTTP status.
          # No -f: we inspect the status ourselves instead of aborting the pipe.
          req() {
            local method="$1" url="$2"; shift 2
            curl -sS -o "$BODY" -w '%{http_code}' -X "$method" -H "$AUTH" "$@" "$url"
          }
          json_id() { node -p "JSON.parse(require('fs').readFileSync('$BODY','utf8')).id"; }

          code=$(req GET "$API/releases/tags/$TAG")
          if [ "$code" = 200 ]; then
            RELEASE_ID=$(json_id)
          else
            code=$(req POST "$API/releases" \
              -H "Content-Type: application/json" \
              -d "{\"tag_name\":\"$TAG\",\"name\":\"Release $TAG\"}")
            if [ "$code" = 201 ]; then
              RELEASE_ID=$(json_id)
            elif [ "$code" = 409 ]; then
              # Concurrent job (or the tag push itself) already made the release.
              code=$(req GET "$API/releases/tags/$TAG")
              [ "$code" = 200 ] || { echo "::error::release lookup after 409 failed (HTTP $code)"; cat "$BODY"; exit 1; }
              RELEASE_ID=$(json_id)
            else
              echo "::error::creating release for $TAG failed (HTTP $code)"; cat "$BODY"; exit 1
            fi
          fi

          TARBALL=$(npm pack --pack-destination /tmp | tail -1)
          code=$(req GET "$API/releases/$RELEASE_ID/assets")
          if [ "$code" = 200 ] && node -e "process.exit(JSON.parse(require('fs').readFileSync('$BODY','utf8')).some(a => a.name === '$TARBALL') ? 0 : 1)"; then
            echo "Asset $TARBALL already attached — skipping."
          else
            code=$(req POST "$API/releases/$RELEASE_ID/assets?name=$TARBALL" -F "attachment=@/tmp/$TARBALL")
            [ "$code" = 201 ] || { echo "::error::asset upload of $TARBALL failed (HTTP $code)"; cat "$BODY"; exit 1; }
            echo "Attached $TARBALL to release $TAG."
          fi
