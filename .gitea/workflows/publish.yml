name: Publish to Gitea npm registry

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the "integrated on main" guard below can run merge-base.
          fetch-depth: 0

      # Only publish release tags that are actually merged into main. A tag placed
      # on a feature branch would otherwise publish a partial build (this is how
      # 0.34.0 / 0.35.0 went out incomplete). Tag releases AFTER merging to main.
      - name: Guard — tag must be integrated on main
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" FETCH_HEAD; then
            echo "::error::$GITHUB_SHA is not reachable from origin/main — refusing to publish a non-integrated build. Tag releases only after merging to main."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          # registry-url is what `npm publish` consults; the auth-token in
          # NODE_AUTH_TOKEN is interpolated into the generated .npmrc.
          registry-url: https://code.tarassov.ch/api/packages/ux/npm/
          scope: "@tarassov-ch"

      - name: Install
        run: npm ci

      # Biome ships as a prebuilt linux binary that won't run on the maintainer's
      # NixOS dev box, so it's intentionally NOT in package.json's devDependencies
      # (the flake.nix provides it locally). CI installs it globally here so the
      # `prepublishOnly` hook below can invoke `biome check .`.
      - name: Install biome
        run: npm install -g @biomejs/biome@2.4.15

      - name: Build
        run: npm run build

      # Idempotent: skip (don't fail) if this version is already in the registry,
      # so re-pushed tags or re-run jobs don't 409.
      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGE_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@tarassov-ch/swiss-function@$VERSION" version >/dev/null 2>&1; then
            echo "Version $VERSION is already published — skipping."
            exit 0
          fi
          npm publish

      # The registry gets the package; the repo Releases page gets the release
      # entry with the packed tarball attached (the manual `just
      # release-package` flow, automated). Idempotent like the publish above:
      # an existing release is reused, an existing asset is skipped.
      - name: Forgejo release + tarball asset
        env:
          TOKEN: ${{ secrets.PACKAGE_TOKEN }}
        run: |
          API="https://code.tarassov.ch/api/v1/repos/${GITHUB_REPOSITORY}"
          TAG="${GITHUB_REF_NAME}"
          AUTH="Authorization: token $TOKEN"
          RELEASE_ID=$(curl -sf -H "$AUTH" "$API/releases/tags/$TAG" \
            | node -p "JSON.parse(require('fs').readFileSync(0)).id" 2>/dev/null || true)
          if [ -z "$RELEASE_ID" ]; then
            RELEASE_ID=$(curl -sf -X POST -H "$AUTH" -H "Content-Type: application/json" \
              -d "{\"tag_name\": \"$TAG\", \"name\": \"Release $TAG\"}" "$API/releases" \
              | node -p "JSON.parse(require('fs').readFileSync(0)).id")
          fi
          TARBALL=$(npm pack --pack-destination /tmp | tail -1)
          if curl -sf -H "$AUTH" "$API/releases/$RELEASE_ID/assets" \
            | node -p "JSON.parse(require('fs').readFileSync(0)).some(a => a.name === '$TARBALL')" \
            | grep -q true; then
            echo "Asset $TARBALL already attached — skipping."
          else
            curl -sf -X POST -H "$AUTH" -F "attachment=@/tmp/$TARBALL" \
              "$API/releases/$RELEASE_ID/assets?name=$TARBALL" > /dev/null
            echo "Attached $TARBALL to release $TAG."
          fi
